# ═══════════════════════════════════════════════════════════════════════════
# NETWORK CONFIGURATION
# Isolated network for all outbound services
# ═══════════════════════════════════════════════════════════════════════════

networks:
  outvox-network:
    driver: bridge
    name: outvox-network

# ═══════════════════════════════════════════════════════════════════════════
# USAGE INSTRUCTIONS
# ═══════════════════════════════════════════════════════════════════════════
#
# Start all services:
#   docker-compose up -d
#
# Start with rebuild:
#   docker-compose up --build -d
#
# View logs:
#   docker-compose logs -f
#
# View logs for specific agent:
#   docker-compose logs -f outvox-agent1
#
# Stop all services:
#   docker-compose down
#
# Restart all services:
#   docker-compose restart
#
# Check service status:
#   docker-compose ps
#
# Scale agents (if needed in future):
#   docker-compose up -d --scale outvox-agent1=2
#
# ═══════════════════════════════════════════════════════════════════════════
# ENVIRONMENT VARIABLES
# ═══════════════════════════════════════════════════════════════════════════
#
# All configuration is loaded from .env file automatically, including:
#
# Required:
#   - API_KEY
#   - OPENAI_API_KEY
#   - TWILIO_ACCOUNT_SID
#   - TWILIO_AUTH_TOKEN
#   - TWILIO_VALIDATE_SIGNATURE=true
#   - PUBLIC_WEBHOOK_BASE_URL
#   - MEDIA_STREAM_VALIDATE_TOKEN=true
#   - DATABASE_BACKEND=sqlserver
#   - SQLServer, SQLUser, SQLPassword, SQLDatabase
#   - NGROK_HOST
#
# V2.0 Features:
#   - MAX_CALL_DURATION (default: 300)
#   - ENABLE_CALL_RECORDING (default: true)
#   - ENFORCE_ENGLISH_ONLY (default: true)
#   - SENTIMENT_THRESHOLD (default: -0.3)
#   - VOICE_SELECTION (default: sage)
#
# See env.template for complete list of available variables
#
