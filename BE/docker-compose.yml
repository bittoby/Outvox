# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║                 OUTBOUND CALLING SYSTEM                           ║
# ║                 Docker Compose Configuration                                 ║
# ╚══════════════════════════════════════════════════════════════════════════════╝
#
# Architecture:
#   - 1 Nginx Load Balancer (port 5100)
#   - 10 Voice Agents (ports 5101-5110)
#   - Shared network for inter-service communication
#
# All shared configuration (API keys, settings) is loaded from .env automatically
# Only agent-specific values (AGENT_ID) are set per service

services:
  # ═══════════════════════════════════════════════════════════════════════════
  # NGINX LOAD BALANCER
  # Distributes incoming requests across all healthy agents
  # ═══════════════════════════════════════════════════════════════════════════
  
  nginx-proxy:
    image: nginx:alpine
    container_name: outvox-nginx
    ports:
      - "5100:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - outvox-agent1
      - outvox-agent2
      - outvox-agent3
      - outvox-agent4
      - outvox-agent5
      - outvox-agent6
      - outvox-agent7
      - outvox-agent8
      - outvox-agent9
      - outvox-agent10
    networks:
      - outvox-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/nginx-health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ═══════════════════════════════════════════════════════════════════════════
  # VOICE AGENTS (OUT1 - OUT10)
  # Each agent handles outbound calls with AI voice processing
  # All configuration loaded from .env except agent-specific AGENT_ID
  # ═══════════════════════════════════════════════════════════════════════════

  outvox-agent1:
    build: .
    container_name: outvox-agent1
    ports:
      - "5101:5001"
    environment:
      - AGENT_ID=OUT1          # Agent-specific identifier
      - PORT=5001              # Internal port (for clarity)
      - DB_SERVICE_URL=http://host.docker.internal:8000  # Override for Docker
    env_file:
      - .env                   # All other config loaded from here
    restart: unless-stopped
    networks:
      - outvox-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

