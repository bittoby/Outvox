events {
    worker_connections 1024;
}

http {
    # Add DNS resolver for Docker internal networking
    resolver 127.0.0.11 valid=30s;

    # Define upstream servers for outbound agents
    upstream outvox_agent_pool {
        # Use least_conn for better distribution of outbound calls
        least_conn;
        
        server outvox-agent1:5001 max_fails=3 fail_timeout=30s;
        server outvox-agent2:5001 max_fails=3 fail_timeout=30s;
        server outvox-agent3:5001 max_fails=3 fail_timeout=30s;
        server outvox-agent4:5001 max_fails=3 fail_timeout=30s;
        server outvox-agent5:5001 max_fails=3 fail_timeout=30s;
        server outvox-agent6:5001 max_fails=3 fail_timeout=30s;
        server outvox-agent7:5001 max_fails=3 fail_timeout=30s;
        server outvox-agent8:5001 max_fails=3 fail_timeout=30s;
        server outvox-agent9:5001 max_fails=3 fail_timeout=30s;
        server outvox-agent10:5001 max_fails=3 fail_timeout=30s;
    }

    # Enable logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    server {
        listen 80;
        server_name _;

        # Extended timeouts for long-running voice calls (up to 15 minutes)
        # Voice calls can last up to MAX_CALL_DURATION (default 600s/10min)
        # Added buffer for safety
        proxy_connect_timeout 120s;
        proxy_send_timeout 900s;
        proxy_read_timeout 900s;
        
        # WebSocket support for media streams
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Dynamic agent routing - single pattern handles all agents
        location ~ ^/agent/OUT([1-9]|10)/(.*)$ {
            resolver 127.0.0.11 valid=30s;
            set $agent_num $1;
            proxy_pass http://outvox-agent$agent_num:5001/$2$is_args$args;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            # Extended timeouts for WebSocket voice streams
            proxy_connect_timeout 120s;
            proxy_send_timeout 900s;
            proxy_read_timeout 900s;
        }

        # Load balanced routes (for call initiation only)
        location /start-calling {
            proxy_pass http://outvox_agent_pool;
        }
        
        location /start-calling-with-data {
            proxy_pass http://outvox_agent_pool;
        }
        
        location /manual-dial {
            proxy_pass http://outvox_agent_pool;
        }
        
        # Health check and management routes
        location /health {
            proxy_pass http://outvox_agent_pool;
        }
        
        # Fallback for other routes
        location / {
            proxy_pass http://outvox_agent_pool;
        }

        # Health check endpoint
        location /nginx-health {
            access_log off;
            return 200 "outbound-healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
