name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            BE/requirements.txt
            tests/requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl gnupg unixodbc-dev
          sudo install -m 0755 -d /etc/apt/keyrings
          curl -fsSL https://packages.microsoft.com/keys/microsoft.asc \
            | sudo gpg --dearmor -o /etc/apt/keyrings/packages-microsoft-prod.gpg
          echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/packages-microsoft-prod.gpg] https://packages.microsoft.com/ubuntu/24.04/prod noble main" \
            | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r BE/requirements.txt
          pip install -r tests/requirements.txt

      - name: Import backend entry points
        env:
          DATABASE_BACKEND: sqlserver
          SQLServer: localhost
          SQLDatabase: outvox
          SQLUser: sa
          SQLPassword: test-password
          OPENAI_API_KEY: test-openai-key
          TWILIO_ACCOUNT_SID: AC00000000000000000000000000000000
          TWILIO_AUTH_TOKEN: test-twilio-token
          API_KEY: test-api-key
          MEDIA_STREAM_VALIDATE_TOKEN: "false"
        run: |
          PYTHONPATH=BE python -c "import db_service, outbound_main; assert db_service.app is not None; assert outbound_main.app is not None; print('backend entry points imported')"

      - name: Run pytest
        env:
          OPENAI_API_KEY: test-openai-key
          TWILIO_ACCOUNT_SID: AC00000000000000000000000000000000
          TWILIO_AUTH_TOKEN: test-twilio-token
          API_KEY: test-api-key
        run: PYTHONPATH=BE pytest

  frontend:
    name: Frontend lint and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: FE
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: FE/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Build frontend
        run: npm run build
