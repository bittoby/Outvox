version: 2
updates:
  - package-ecosystem: npm
    directory: /FE
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - frontend

  - package-ecosystem: pip
    directory: /BE
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - backend

  - package-ecosystem: pip
    directory: /tests
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - tests

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
